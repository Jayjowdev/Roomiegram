services:
  # --- MySQL por servicio ---

  mysql-comprobante:
    image: mysql:8.4
    container_name: roomiegram-mysql-comprobante
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_comprobante
    ports:
      - "3307:3306"
    volumes:
      - mysql_comprobante_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-hogar:
    image: mysql:8.4
    container_name: roomiegram-mysql-hogar
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_hogar
    ports:
      - "3308:3306"
    volumes:
      - mysql_hogar_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-hogarcuenta:
    image: mysql:8.4
    container_name: roomiegram-mysql-hogarcuenta
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_hogarcuenta
    ports:
      - "3309:3306"
    volumes:
      - mysql_hogarcuenta_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-notificacion:
    image: mysql:8.4
    container_name: roomiegram-mysql-notificacion
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_notificacion
    ports:
      - "3310:3306"
    volumes:
      - mysql_notificacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-publicacion:
    image: mysql:8.4
    container_name: roomiegram-mysql-publicacion
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_publicacion
    ports:
      - "3311:3306"
    volumes:
      - mysql_publicacion_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-tarea:
    image: mysql:8.4
    container_name: roomiegram-mysql-tarea
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_tarea
    ports:
      - "3312:3306"
    volumes:
      - mysql_tarea_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  mysql-usuario:
    image: mysql:8.4
    container_name: roomiegram-mysql-usuario
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-roomiegram}
      MYSQL_DATABASE: roomiegram_usuario
    ports:
      - "3313:3306"
    volumes:
      - mysql_usuario_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-roomiegram}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net
    restart: unless-stopped

  # --- Microservicios ---

  comprobante:
    build: ./Proyecto/Backend/Spring/comprobante
    container_name: roomiegram-comprobante
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${COMPROBANTE_DATASOURCE_URL:-jdbc:mysql://mysql-comprobante:3306/roomiegram_comprobante?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
    depends_on:
      mysql-comprobante:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  hogar:
    build: ./Proyecto/Backend/Spring/hogar
    container_name: roomiegram-hogar
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: ${HOGAR_DATASOURCE_URL:-jdbc:mysql://mysql-hogar:3306/roomiegram_hogar?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
    depends_on:
      mysql-hogar:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  hogarcuenta:
    build: ./Proyecto/Backend/Spring/hogarcuenta
    container_name: roomiegram-hogarcuenta
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: ${HOGARCUENTA_DATASOURCE_URL:-jdbc:mysql://mysql-hogarcuenta:3306/roomiegram_hogarcuenta?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
    depends_on:
      mysql-hogarcuenta:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  notificacion:
    build: ./Proyecto/Backend/Spring/notificacion
    container_name: roomiegram-notificacion
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: ${NOTIFICACION_DATASOURCE_URL:-jdbc:mysql://mysql-notificacion:3306/roomiegram_notificacion?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
    depends_on:
      mysql-notificacion:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  publicacion:
    build: ./Proyecto/Backend/Spring/publicacion
    container_name: roomiegram-publicacion
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: ${PUBLICACION_DATASOURCE_URL:-jdbc:mysql://mysql-publicacion:3306/roomiegram_publicacion?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
      HOGAR_SERVICE_URL: ${HOGAR_SERVICE_URL:-http://hogar:8083}
    depends_on:
      mysql-publicacion:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  tarea:
    build: ./Proyecto/Backend/Spring/tarea
    container_name: roomiegram-tarea
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: ${TAREA_DATASOURCE_URL:-jdbc:mysql://mysql-tarea:3306/roomiegram_tarea?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
    depends_on:
      mysql-tarea:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  usuario:
    build: ./Proyecto/Backend/Spring/usuario
    container_name: roomiegram-usuario
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: ${USUARIO_DATASOURCE_URL:-jdbc:mysql://mysql-usuario:3306/roomiegram_usuario?useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-roomiegram}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://*:5173}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      MAIL_FROM: ${MAIL_FROM:-no-reply@roomiegram.com}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mysql-usuario:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: roomiegram-redis
    networks:
      - roomiegram-net
    restart: unless-stopped

  apigateway:
    build: ./Proyecto/Backend/Spring/apigateway
    container_name: roomiegram-apigateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USUARIO_HOST: usuario
      HOGAR_HOST: hogar
      HOGARCUENTA_HOST: hogarcuenta
      COMPROBANTE_HOST: comprobante
      PUBLICACION_HOST: publicacion
      TAREA_HOST: tarea
      NOTIFICACION_HOST: notificacion
    depends_on:
      - redis
      - usuario
      - hogar
      - hogarcuenta
      - comprobante
      - publicacion
      - tarea
      - notificacion
    networks:
      - roomiegram-net
    restart: unless-stopped

  frontend:
    build: ./Proyecto/Frontend/Roomiegram
    container_name: roomiegram-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8080}
      VITE_USE_DIRECT_SERVICE_URLS: ${VITE_USE_DIRECT_SERVICE_URLS:-false}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    volumes:
      - ./Proyecto/Frontend/Roomiegram:/app
      - /app/node_modules
    networks:
      - roomiegram-net
    restart: unless-stopped

volumes:
  mysql_comprobante_data:
    name: roomiegram_mysql_comprobante_data
  mysql_hogar_data:
    name: roomiegram_mysql_hogar_data
  mysql_hogarcuenta_data:
    name: roomiegram_mysql_hogarcuenta_data
  mysql_notificacion_data:
    name: roomiegram_mysql_notificacion_data
  mysql_publicacion_data:
    name: roomiegram_mysql_publicacion_data
  mysql_tarea_data:
    name: roomiegram_mysql_tarea_data
  mysql_usuario_data:
    name: roomiegram_mysql_usuario_data

networks:
  roomiegram-net:
    driver: bridge
