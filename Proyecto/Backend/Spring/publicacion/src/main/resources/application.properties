spring.application.name=publicacion

server.port=${SERVER_PORT:8086}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/roomiegram_publicacion}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://*:5173}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inter-service URLs
hogar.service.url=${HOGAR_SERVICE_URL:http://localhost:8083}
usuario.service.url=${USUARIO_SERVICE_URL:http://localhost:8088}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.roomiegram.publicacion.controller
