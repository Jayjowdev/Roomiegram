spring.datasource.url=jdbc:h2:mem:publicacion-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

hogar.service.url=http://localhost:8083
usuario.service.url=http://localhost:8088
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://*:5173
