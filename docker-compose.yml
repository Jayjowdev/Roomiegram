services:
  # MySQL
  mysql:
    image: mysql:8.4
    container_name: roomiegram-mysql
    environment:
      MYSQL_ROOT_PASSWORD: roomiegram
      MYSQL_DATABASE: roomiegram
    ports:
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proomiegram"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - roomiegram-net

  # Microservicios
  comprobante:
    build: ./Proyecto/Backend/Spring/comprobante
    container_name: roomiegram-comprobante
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  hogar:
    build: ./Proyecto/Backend/Spring/hogar
    container_name: roomiegram-hogar
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  hogarcuenta:
    build: ./Proyecto/Backend/Spring/hogarcuenta
    container_name: roomiegram-hogarcuenta
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  notificacion:
    build: ./Proyecto/Backend/Spring/notificacion
    container_name: roomiegram-notificacion
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure
  publicacion:
    build: ./Proyecto/Backend/Spring/publicacion
    container_name: roomiegram-publicacion
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
      HOGAR_SERVICE_URL: http://hogar:8083
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  tarea:
    build: ./Proyecto/Backend/Spring/tarea
    container_name: roomiegram-tarea
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  usuario:
    build: ./Proyecto/Backend/Spring/usuario
    container_name: roomiegram-usuario
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/roomiegram?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: roomiegram
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      MAIL_FROM: ${MAIL_FROM:-no-reply@roomiegram.com}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - roomiegram-net
    restart: on-failure

  frontend:
    build: ./Proyecto/Frontend/Roomiegram
    container_name: roomiegram-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Proyecto/Frontend/Roomiegram:/app
      - /app/node_modules
    networks:
      - roomiegram-net
    restart: on-failure

volumes:
  mysql_data:
    name: roomiegram_mysql_data

networks:
  roomiegram-net:
    driver: bridge
